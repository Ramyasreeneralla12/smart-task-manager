<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Edit Task</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <div class="form-box edit-box">

        <h1>Edit Task</h1>

        <!-- FLASH -->

        {% with messages = get_flashed_messages(with_categories=true) %}

            {% if messages %}

                {% for category, message in messages %}

                    <div class="flash-message {{ category }}">

                        {{ message }}

                    </div>

                {% endfor %}

            {% endif %}

        {% endwith %}

        <form method="POST"
              class="auth-form">

            <input type="text"
                   name="title"
                   value="{{ task.title }}"
                   required>

            <textarea name="description"
                      required>{{ task.description }}</textarea>

            <select name="priority">

                <option value="High"
                    {% if task.priority == "High" %}
                        selected
                    {% endif %}>
                    High
                </option>

                <option value="Medium"
                    {% if task.priority == "Medium" %}
                        selected
                    {% endif %}>
                    Medium
                </option>

                <option value="Low"
                    {% if task.priority == "Low" %}
                        selected
                    {% endif %}>
                    Low
                </option>

            </select>

            <select name="status">

                <option value="Pending"
                    {% if task.status == "Pending" %}
                        selected
                    {% endif %}>
                    Pending
                </option>

                <option value="Completed"
                    {% if task.status == "Completed" %}
                        selected
                    {% endif %}>
                    Completed
                </option>

            </select>

            <input type="date"
                   name="deadline"
                   value="{{ task.deadline }}"
                   required>

            <button type="submit">

                Update Task

            </button>

        </form>

        <p class="bottom-text">

            <a href="/dashboard">

                Back to Dashboard

            </a>

        </p>

    </div>

</div>

</body>

</html>
